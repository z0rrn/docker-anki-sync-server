name: "Build and push image on native architecture"

# run workflow on every branch, only upload on main (allow manual trigger)
on:
  # build image on push
  push:
    # don't build if only docs changed
    paths-ignore:
      - "**.md"

  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable SSH access at the end of the workflow"
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: "Build packages"

    runs-on: ubuntu-24.04
    #runs-on: ${{ matrix.os }}
    #strategy:
    #  matrix:
    #    os: [ubuntu-24.04, ubuntu-24.04-arm]

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Clone git repository ankitects/anki
        uses: actions/checkout@v4
        with:
          repository: ankitects/anki
          submodules: true

      - name: Setup interactive ssh session
        uses: Warpbuilds/action-debugger@v1.3

