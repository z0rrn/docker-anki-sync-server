name: "Build and push image on native architecture"

# run workflow on every branch, only upload on main (allow manual trigger)
on:
  # build image on push
  push:
    # don't build if only docs changed
    paths-ignore:
      - "**.md"

  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable SSH access at the end of the workflow"
        type: boolean
        required: false
        default: false

jobs:
  build-packages:
    name: "Build packages"

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            docker_platform: linux-amd64
          - os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            docker_platform: linux-arm64

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4
      - uses: arduino/setup-protoc@v3

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust_target }}

      - name: Clone ankitects/anki repository
        uses: actions/checkout@v4
        with:
          repository: ankitects/anki
          path: ankitects-anki
          submodules: true

      #- name: Setup interactive ssh session
      #  uses: Warpbuilds/action-debugger@v1.3

      #- name: Generate fake artifacts
      #  run: |
      #    mkdir -p ${{ github.workspace }}/ankitects-anki/target/${{ matrix.rust_target }}/release
      #    echo "Moin ${{ matrix.rust_target }}" > ${{ github.workspace }}/ankitects-anki/target/${{ matrix.rust_target }}/release/anki-sync-server

      - name: Build anki-sync-server with release profile
        run: |
          cd ${{ github.workspace }}/ankitects-anki/
          PROTOC=$(which protoc) \
          RUSTFLAGS='-C target-feature=+crt-static' \
          cargo build --release --target ${{ matrix.rust_target }} --package anki-sync-server

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anki-sync-server-${{ matrix.docker_platform }}
          path: ${{ github.workspace }}/ankitects-anki/target/${{ matrix.rust_target }}/release/anki-sync-server
          if-no-files-found: error
          retention-days: 2

  build-and-push-image:
    name: "Build and push Docker image"
    needs: [build-packages]

    runs-on: ubuntu-24.04

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: z0rrn
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: zorrn
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Downloads all artifacts
        # Downloads to ${{ github.workspace }}/target/anki-sync-server-${{ matrix.rust_target }}
        # So executable at ${{ github.workspace }}/target/anki-sync-server-${{ matrix.rust_target }}/anki-sync-server
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/target

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            zorrn/test123:latest

      #- name: Setup interactive ssh session
      #  uses: Warpbuilds/action-debugger@v1.3

